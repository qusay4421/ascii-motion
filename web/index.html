<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ascii-motion</title>
<style>
  :root { --paper: #f3efe6; --ink: #221f1c; --line: #cdbf9f; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--ink); color: var(--paper);
    font: 14px/1.5 ui-monospace, "DejaVu Sans Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  header { padding: 22px 16px 8px; text-align: center; }
  h1 { margin: 0; font-size: 18px; letter-spacing: .22em; text-transform: uppercase; }
  p.sub { margin: 6px 0 0; color: var(--line); }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 14px; }
  button, label.file {
    background: transparent; color: var(--paper); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 16px; cursor: pointer; font: inherit;
    letter-spacing: .12em; text-transform: uppercase; font-size: 11px;
  }
  button:hover, label.file:hover { background: var(--line); color: var(--ink); }
  input[type=file] { display: none; }
  .frame { padding: 16px; }
  canvas { background: var(--paper); border-radius: 4px; max-width: 96vw; height: auto; display: block; }
  #hint { color: var(--line); padding: 8px; min-height: 20px; }
  footer { color: var(--line); opacity: .6; padding: 16px; font-size: 11px; }
</style>
</head>
<body>
  <header>
    <h1>ascii&#8202;&middot;&#8202;motion</h1>
    <p class="sub">an image, replicated in characters, assembling itself</p>
  </header>
  <div class="controls">
    <button data-mode="wipe">Wipe</button>
    <button data-mode="radial">Radial</button>
    <button data-mode="scatter">Scatter</button>
    <button data-mode="rows">Rows</button>
    <button id="replay">Replay</button>
    <label class="file">Load .json<input id="file" type="file" accept="application/json,.json"></label>
  </div>
  <div id="hint"></div>
  <div class="frame"><canvas id="stage"></canvas></div>
  <footer>generated by cli.py, animated on a canvas</footer>
  <script type="module" src="app.js"></script>
</body>
</html>
